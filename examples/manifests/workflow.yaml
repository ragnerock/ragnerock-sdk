apiVersion: v1
kind: Workflow
metadata:
  name: review-pipeline
spec:
  description: Extract entities, then classify sentiment on paragraphs with entities.
  is_active: true
  auto_run_on_upload: false
  nodes:
    - name: extract
      operator: entity-extractor
      on_error: FAIL_JOB
      max_retries: 2
    - name: classify
      operator: sentiment-classifier
      condition:
        extract:
          entities:
            $gt: 0
      persist: true
  edges:
    - [extract, classify]
