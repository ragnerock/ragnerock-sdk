name: PR Checks

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  PROJECT_ID: ragnerock-testing
  REGION: us-central1
  ENVIRONMENT: dev
  WORKLOAD_IDENTITY_PROVIDER: projects/843664128510/locations/global/workloadIdentityPools/github-actions-pool/providers/github-ragnerock
  WORKLOAD_SERVICE_ACCOUNT: github-ragnerock@ragnerock-testing.iam.gserviceaccount.com
  PYTHONUNBUFFERED: "1" # prevent output buffering

jobs:
  code-quality:
    name: Check code quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.3"

      - name: Install dependencies
        run: |
          uv sync --all-packages

      - name: Install Terraform tools
        run: |
          curl -sSLo ./terraform-docs.tar.gz https://terraform-docs.io/dl/v0.21.0/terraform-docs-v0.21.0-$(uname)-amd64.tar.gz
          tar -xzf terraform-docs.tar.gz
          chmod +x terraform-docs
          mv terraform-docs /usr/local/bin/terraform-docs

          curl -s https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash

      - name: Lint 
        run: |
          ./scripts/ci/lint.sh

      - name: Static check
        run: |
          ./scripts/ci/check.sh

      - name: Format
        run: |
          ./scripts/ci/format.sh
        
      - name: Docs
        run: |
          ./scripts/ci/doc.sh

  infra-plan:
    name: Plan infrastructure changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.WORKLOAD_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.3"
        
      - name: Plan
        run: |
          COMMIT_SHA=${{ github.sha }}
          SHORT_SHA=${COMMIT_SHA:0:7}

          TAG="${SHORT_SHA}" ./scripts/ci/plan-infra.sh
        env:
          CLOUDFLARE_API_TOKEN: "${{ secrets.CLOUDFLARE_API_TOKEN }}"

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - "5432:5432"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.WORKLOAD_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          uv sync --all-packages

      - name: Run unit tests
        run: |
          ./scripts/ci/run-unit-tests.sh
        env:
          RAGNEROCK_IS_CI: 'true'