name: PR Checks

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PYTHONUNBUFFERED: "1" # prevent output buffering

jobs:
  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install go-task
        run: |
          curl -1sLf 'https://dl.cloudsmith.io/public/task/task/setup.deb.sh' | sudo -E bash
          sudo apt install task

      - name: Run unit tests
        run: |
          task test-integration ENVIRONMENT=dev
        env:
          RAGNEROCK_IS_CI: 'true'
          RAGNEROCK_ITEST_PAGINATION: '1'
          RAGNEROCK_ITEST_RUN_WORKFLOWS: '1'
          RAGNEROCK_CONNECTION_STRING: 'ragnerock://api-dev.ragnerock.com/Test'
          RAGNEROCK_API_TOKEN: "${{ secrets.RAGNEROCK_API_TOKEN }}"